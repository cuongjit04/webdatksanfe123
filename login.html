    <meta charset="UTF-8" />

    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" />


<script src="https://code.jquery.com/jquery-1.12.4.min.js"
    integrity="sha256-ZosEbRLbNQzLpnKIkEdrPv7lOy9C27hHQ+Xp8a4MxAQ=" crossorigin="anonymous"></script>
    
</head>

<body>
    <header class="head">
        <div class="content flex_space">
            <h2 style="font-size: xx-large; font-family: Georgia, 'Times New Roman', Times, serif; color: rgb(255, 255, 255);
            text-shadow: 5px 4px 2px #131313;">Sea Hotel</h2>
            <div class="navlinks">
                <ul id="menulist">
                    <li><a href="index1.html">TRANG CHỦ</a></li>
                    <li><a href="lienhe.html">LIÊN HỆ</a></li>
                    <li><a href="rooms.html">PHÒNG</a></li>
                    <li><a href="gioithieu.html">GIỚI THIỆU</a></li>
                    <li><a href="login.html">ĐĂNG NHẬP / ĐĂNG KÝ</a></li>
                    <li style="color: #fff;"> <i class="fa fa-search"></i> </li>
                </ul>
                <span class="fa fa-bars" onclick="menutoggle()"></span>
            </div>
        </div>
    </header>
    <script>
        var menulist = document.getElementById('menulist');
        menulist.style.maxHeight = "0px";

        function menutoggle() {
            if (menulist.style.maxHeight == "0px") {
                menulist.style.maxHeight = "100vh";
            } else {
                menulist.style.maxHeight = "0px";
            }

        }
    </script>

    <section class="wrapper">
        <div class="form login">
            <header>Đăng nhập</header>
            <form action="#">
                <input type="text" placeholder="Địa chỉ Email" required />
                <input type="password" placeholder="Mật khẩu" required />
                <a href="#">Quên mật khẩu?</a>
                <input type="submit" value="Login" />
            </form>
        </div>
        <div class="form signup">
            <header>Đăng kí</header>
            <form action="#">
                <input type="text" placeholder="Tên đầy đủ" required />
                <input type="text" placeholder="Địa chỉ Email" required />
                <input type="password" placeholder="Mật khẩu" required />
                <div class="checkbox">
                    <input type="checkbox" id="signupCheck" />
                    <label for="signupCheck">Tôi chấp nhận tất cả các điều khoản và điều kiện</label>
                </div>
                <input type="submit" value="Signup" />
            </form>
        </div>

        <!-- <div class="form login">
            <header>Login</header>
            <form action="#">
                <input type="text" placeholder="Email address" required />
                <input type="password" placeholder="Password" required />
                <a href="#">Forgot password?</a>
                <input type="submit" value="Login" />
            </form>
        </div> -->

        <script>
            const wrapper = document.querySelector(".wrapper"),
                signupHeader = document.querySelector(".signup header"),
                loginHeader = document.querySelector(".login header");

            loginHeader.addEventListener("click", () => {
                wrapper.classList.add("active");
            });
            signupHeader.addEventListener("click", () => {
                wrapper.classList.remove("active");
            });
        </script>
    </section>
</body>

</html>
