 Animated Login & Registration Form,Form Design,HTML and CSS,HTML CSS JavaScript,login & registration form,login & signup form,Login Form Design,registration form,Signup Form,HTML,CSS,JavaScript,

<body>
    <header class="site-header">
        <div class="content flex_space header-inner">
            <a class="brand" href="index.html" aria-label="Shinseidai">
                <span class="brand-name">Shinseidai</span>
                <span class="brand-tagline">Service & Trading Company</span>
            </a>
            <div class="navlinks">
                <ul id="menulist" class="nav-menu">
                    <li><a href="index.html">TRANG CHỦ</a></li>
                    <li><a href="gioithieu.html">GIỚI THIỆU</a></li>
                    <li><a href="rooms.html">DỊCH VỤ</a></li>
                    <li><a href="lienhe.html">LIÊN HỆ</a></li>
                    <li><a href="login.html">TÀI KHOẢN</a></li>
                </ul>
                <button class="nav-toggle" type="button" aria-label="Mở menu" onclick="menutoggle()">
                    <span class="fa fa-bars"></span>
                </button>
            </div>
        </div>
    </header>
    <script>
        var menulist = document.getElementById('menulist');

        function syncMenuForViewport() {
            var isMobile = window.matchMedia("(max-width: 768px)").matches;
            if (!isMobile) {
                menulist.style.maxHeight = "";
            } else if (!menulist.style.maxHeight) {
                menulist.style.maxHeight = "0px";
            }
        }

        function menutoggle() {
            var isMobile = window.matchMedia("(max-width: 768px)").matches;
            if (!isMobile) return;
            if (menulist.style.maxHeight && menulist.style.maxHeight !== "0px") {
                menulist.style.maxHeight = "0px";
            } else {
                menulist.style.maxHeight = "70vh";
            }
        }

        window.addEventListener("resize", syncMenuForViewport);
        syncMenuForViewport();
    </script>

    <section class="wrapper">
        <div class="form login">
            <header>Đăng nhập</header>
            <form action="#">
                <input type="text" placeholder="Địa chỉ Email" required />
                <input type="password" placeholder="Mật khẩu" required />
                <a href="#">Quên mật khẩu?</a>
                <input type="submit" value="Login" />
            </form>
        </div>
        <div class="form signup">
            <header>Đăng kí</header>
            <form action="#">
                <input type="text" placeholder="Tên đầy đủ" required />
                <input type="text" placeholder="Địa chỉ Email" required />
                <input type="password" placeholder="Mật khẩu" required />
                <div class="checkbox">
                    <input type="checkbox" id="signupCheck" />
                    <label for="signupCheck">Tôi chấp nhận tất cả các điều khoản và điều kiện</label>
                </div>
                <input type="submit" value="Signup" />
            </form>
        </div>

        <!-- <div class="form login">
            <header>Login</header>
            <form action="#">
                <input type="text" placeholder="Email address" required />
                <input type="password" placeholder="Password" required />
                <a href="#">Forgot password?</a>
                <input type="submit" value="Login" />
            </form>
        </div> -->

        <script>
            const wrapper = document.querySelector(".wrapper"),
                signupHeader = document.querySelector(".signup header"),
                loginHeader = document.querySelector(".login header");

            loginHeader.addEventListener("click", () => {
                wrapper.classList.add("active");
            });
            signupHeader.addEventListener("click", () => {
                wrapper.classList.remove("active");
            });
        </script>
    </section>
</body>

</html>
